<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Patryk Stępień — .NET & Blazor developer portfolio" />
    <title>Patryk Stępień — Developer</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/portfolio.css" />
    <!-- Blazor scoped styles -->
    <link href="PatrykPortfolio.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- GitHub Pages SPA: decode redirect from 404.html -->
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var p = params.get('p');
            if (p) {
                window.history.replaceState(null, null, decodeURIComponent(p) + (window.location.hash || ''));
            }
        })();
    </script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x2715;</span>
    </div>

    <script src="js/scroll.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
